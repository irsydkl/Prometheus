<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Kapal - Prometheus</title>
    <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://kit.fontawesome.com/05aea6e721.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap');
        .outfit { font-family: 'Outfit'; }
        .leaflet-container { z-index: 1 !important; }
    </style>
</head>

<body class="outfit">
    <!-- Tombol sidebar mobile -->
    <button data-drawer-target="default-sidebar" data-drawer-toggle="default-sidebar" aria-controls="default-sidebar"
        type="button"
        class="text-white bg-[#141414] fixed top-3 left-3 z-50 p-2 rounded-lg inline-flex sm:hidden">
        <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="M5 7h14M5 12h14M5 17h10" />
        </svg>
    </button>

    <aside id="default-sidebar"
        class="fixed top-0 left-0 z-40 w-[80px] sm:w-[100px] h-full transition-transform -translate-x-full sm:translate-x-0"
        aria-label="Sidebar">
        <div class="h-full bg-[#141414] flex flex-col">
            <ul class="flex-1">
                <li>
                    <ul class="space-y-2 px-3 sm:px-5 py-4 font-medium bg-gradient-to-b from-[#848484] to-[#141414]">
                        <li><img src="img/Um.png" class="w-full"></li>
                        <li><img src="img/Vokasi.png" class="w-full"></li>
                        <li><img src="img/Prometheus.png" class="w-full"></li>
                    </ul>
                </li>
                <li class="hidden sm:flex items-center justify-center py-[140px]">
                    <span class="inline-block -rotate-90 text-white text-[40px] tracking-widest font-bold whitespace-nowrap">PROMETHEUS</span>
                </li>
            </ul>
        </div>
    </aside>

    <div class="sm:ml-[100px] min-h-screen bg-[#010101]">
        <!-- 1 kolom di HP, 2 kolom di laptop -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 p-3 sm:p-5">

            <!-- Informasi Kapal -->
            <div class="bg-[#17161B] text-white text-center rounded-xl p-3 sm:p-4">
                <span class="text-lg sm:text-xl lg:text-[25px] font-bold">
                    <i class="fa-solid fa-circle-info mr-2"></i>Informasi Kapal
                </span>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
                    <!-- Posisi Kapal -->
                    <div class="bg-[#262628] border border-[#676767] sm:col-span-2 p-3 sm:p-4 mt-3 rounded-xl">
                        <div class="grid grid-cols-3 gap-3">
                            <div class="col-span-2 text-left">
                                <h1 class="text-white/50 text-sm sm:text-lg lg:text-[25px] font-semibold">Posisi Kapal</h1>
                                <table class="font-semibold text-xs sm:text-sm lg:text-[18px] w-full">
                                    <tr>
                                        <td class="pb-1 pr-2">Latitude</td>
                                        <td class="pb-1 pr-2">:</td>
                                        <td class="text-white pb-1 break-all" id="ship-lat">-</td>
                                    </tr>
                                    <tr>
                                        <td class="pr-2">Longitude</td>
                                        <td class="pr-2">:</td>
                                        <td class="text-white break-all" id="ship-lng">-</td>
                                    </tr>
                                </table>
                            </div>
                            <div class="flex items-center justify-center">
                                <i class="fa-solid fa-location-dot text-[50px] sm:text-[80px] lg:text-[120px] rotate-45 text-white/25"></i>
                            </div>
                        </div>
                    </div>
                    <!-- Kecepatan Angin -->
                    <div class="bg-[#262628] border border-[#676767] p-3 sm:p-4 mt-3 rounded-xl">
                        <div class="grid grid-cols-2 gap-2">
                            <div class="text-left col-span-2">
                                <h1 class="text-white/50 text-sm sm:text-base lg:text-[25px] font-semibold">Kecepatan Angin</h1>
                            </div>
                            <div class="text-left my-auto text-sm sm:text-lg lg:text-[25px] font-semibold">
                                <span id="speed-wind">-</span> m/s
                            </div>
                            <div class="flex justify-end items-center">
                                <i class="fa-solid fa-wind text-[35px] sm:text-[50px] lg:text-[70px] text-white/25"></i>
                            </div>
                        </div>
                    </div>
                    <!-- Kecepatan Kapal -->
                    <div class="bg-[#262628] border border-[#676767] p-3 sm:p-4 mt-3 rounded-xl">
                        <div class="grid grid-cols-2 gap-2">
                            <div class="text-left col-span-2">
                                <h1 class="text-white/50 text-sm sm:text-base lg:text-[25px] font-semibold">Kecepatan Kapal</h1>
                            </div>
                            <div class="text-left my-auto text-sm sm:text-lg lg:text-[25px] font-semibold">
                                <span id="speed-ship">-</span> m/s
                            </div>
                            <div class="flex justify-end items-center">
                                <i class="fa-solid fa-ship text-[35px] sm:text-[50px] lg:text-[70px] text-white/25"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <span class="text-lg sm:text-xl lg:text-[25px] font-bold">
                    <i class="fa-solid fa-circle-info mr-2"></i>Log Kapal
                </span>
                <div class="grid grid-cols-2 gap-2 sm:gap-3">
                    <div id="log-enter-arena" class="bg-[#C58709] border border-[#676767] p-2 sm:p-4 mt-3 rounded-xl">
                        <div class="flex items-center gap-2">
                            <i class="log-icon fa-solid fa-circle-exclamation text-[35px] sm:text-[55px] lg:text-[70px] text-white/50 shrink-0"></i>
                            <div class="text-left">
                                <h1 class="text-xs sm:text-base lg:text-[25px] font-semibold">Masuk Stage</h1>
                                <span class="log-status text-white/50 text-xs sm:text-base lg:text-[25px] font-semibold">Pending</span>
                            </div>
                        </div>
                    </div>
                    <div id="log-ready" class="bg-[#C58709] border border-[#676767] p-2 sm:p-4 mt-3 rounded-xl">
                        <div class="flex items-center gap-2">
                            <i class="log-icon fa-solid fa-circle-exclamation text-[35px] sm:text-[55px] lg:text-[70px] text-white/50 shrink-0"></i>
                            <div class="text-left">
                                <h1 class="text-xs sm:text-base lg:text-[25px] font-semibold">Posisi Siap</h1>
                                <span class="log-status text-white/50 text-xs sm:text-base lg:text-[25px] font-semibold">Pending</span>
                            </div>
                        </div>
                    </div>
                    <div id="log-start" class="bg-[#C58709] border border-[#676767] p-2 sm:p-4 mt-3 rounded-xl">
                        <div class="flex items-center gap-2">
                            <i class="log-icon fa-solid fa-circle-exclamation text-[35px] sm:text-[55px] lg:text-[70px] text-white/50 shrink-0"></i>
                            <div class="text-left">
                                <h1 class="text-xs sm:text-base lg:text-[25px] font-semibold">Start</h1>
                                <span class="log-status text-white/50 text-xs sm:text-base lg:text-[25px] font-semibold">Pending</span>
                            </div>
                        </div>
                    </div>
                    <div id="log-finish" class="bg-[#C58709] border border-[#676767] p-2 sm:p-4 mt-3 rounded-xl">
                        <div class="flex items-center gap-2">
                            <i class="log-icon fa-solid fa-circle-exclamation text-[35px] sm:text-[55px] lg:text-[70px] text-white/50 shrink-0"></i>
                            <div class="text-left">
                                <h1 class="text-xs sm:text-base lg:text-[25px] font-semibold">Finish</h1>
                                <span class="log-status text-white/50 text-xs sm:text-base lg:text-[25px] font-semibold">Pending</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Kamera & Peta -->
            <div class="bg-[#17161B] text-white text-center rounded-xl p-3 sm:p-4">
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div class="mt-3 text-center">
                        <h1 class="text-sm sm:text-xl lg:text-[30px] font-bold">Kamera Atas</h1>
                        <video id="video1" class="rounded-xl mt-2 w-full h-[100px] sm:h-[140px] lg:h-[180px] object-cover bg-[#262628]" autoplay playsinline></video>
                    </div>
                    <div class="mt-3 text-center">
                        <h1 class="text-sm sm:text-xl lg:text-[30px] font-bold">Kamera Bawah</h1>
                        <video id="video2" class="rounded-xl mt-2 w-full h-[100px] sm:h-[140px] lg:h-[180px] object-cover bg-[#262628]" autoplay playsinline></video>
                    </div>
                    <div class="col-span-2">
                        <h1 class="text-sm sm:text-xl lg:text-[30px] font-bold">Peta</h1>
                        <div id="map" class="w-full h-[220px] sm:h-[300px] lg:h-[380px] rounded-xl mt-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
    <script>
        const map = L.map('map', {
            dragging: false,
            scrollWheelZoom: false,
            doubleClickZoom: false,
            touchZoom: false,
            boxZoom: false,
            keyboard: false,
            zoomControl: false
        }).setView([-7.960061243011885, 112.62048652662472], 15);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
        }).addTo(map);
        setTimeout(() => map.invalidateSize(), 300);

        const video1 = document.getElementById('video1');
        const video2 = document.getElementById('video2');
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                video1.srcObject = stream;
                video2.srcObject = stream;
            } catch (error) {
                console.error("Error accessing camera:", error);
            }
        }
        startCamera();
    </script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="firebase.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Kapal - Prometheus</title>
    <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://kit.fontawesome.com/05aea6e721.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap');
        .outfit { font-family: 'Outfit'; }
        .leaflet-container { z-index: 1 !important; }
    </style>
</head>

<body class="outfit">
    <button data-drawer-target="default-sidebar" data-drawer-toggle="default-sidebar" aria-controls="default-sidebar"
        type="button"
        class="text-heading bg-transparent box-border border border-transparent hover:bg-neutral-secondary-medium focus:ring-4 focus:ring-neutral-tertiary font-medium leading-5 rounded-base ms-3 mt-3 text-sm p-2 focus:outline-none inline-flex sm:hidden">
        <span class="sr-only">Open sidebar</span>
        <svg class="w-6 h-6" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
            <path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="M5 7h14M5 12h14M5 17h10" />
        </svg>
    </button>

    <aside id="default-sidebar"
        class="fixed top-0 left-0 z-40 w-[100px] h-full transition-transform -translate-x-full sm:translate-x-0"
        aria-label="Sidebar">
        <div class="h-full bg-[#141414]">
            <ul>
                <li>
                    <ul class="space-y-2 px-5 py-4 font-medium bg-gradient-to-b from-[#848484] to-[#141414]">
                        <li><img src="img/Um.png"></li>
                        <li><img src="img/Vokasi.png"></li>
                        <li><img src="img/Prometheus.png"></li>
                    </ul>
                </li>
                <li class="flex items-center justify-center py-[140px]">
                    <span class="inline-block -rotate-90 text-white text-[40px] tracking-widest font-bold whitespace-nowrap">PROMETHEUS</span>
                </li>
            </ul>
        </div>
    </aside>

    <div class="sm:ml-[100px] min-h-screen bg-[#010101]">
        <div class="grid grid-cols-2 gap-4 p-5">
            <div class="bg-[#17161B] text-white text-center rounded-xl p-4">
                <span class="text-[25px] font-bold"><i class="fa-solid fa-circle-info mr-3"></i>Informasi Kapal</span>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div class="bg-[#262628] border border-[#676767] col-span-2 p-4 mt-3 rounded-xl">
                        <div class="grid grid-cols-3 gap-3">
                            <div class="col-span-2 text-left">
                                <h1 class="text-white/50 text-[25px] font-semibold">Posisi Kapal</h1>
                                <table class="font-semibold text-[25px] w-full ml-4">
                                    <tr>
                                        <td class="pb-1 pr-4">Latitude</td>
                                        <td class="pb-1 pr-4">:</td>
                                        <td class="text-white pb-1" id="ship-lat">-</td>
                                    </tr>
                                    <tr>
                                        <td class="pr-4">Longitude</td>
                                        <td class="pr-4">:</td>
                                        <td class="text-white" id="ship-lng">-</td>
                                    </tr>
                                </table>
                            </div>
                            <div><i class="fa-solid fa-location-dot text-[120px] rotate-45 text-white/25"></i></div>
                        </div>
                    </div>
                    <div class="bg-[#262628] border border-[#676767] p-4 mt-3 rounded-xl">
                        <div class="grid grid-cols-2 gap-3">
                            <div class="text-left col-span-2">
                                <h1 class="text-white/50 text-[25px] font-semibold">Kecepatan Angin</h1>
                            </div>
                            <div class="text-left my-auto ml-4 text-[25px] font-semibold">
                                <span id="speed-wind">-</span>
                            </div>
                            <div><i class="fa-solid fa-wind text-[70px] text-white/25"></i></div>
                        </div>
                    </div>
                    <div class="bg-[#262628] border border-[#676767] p-4 mt-3 rounded-xl">
                        <div class="grid grid-cols-2 gap-3">
                            <div class="text-left col-span-2">
                                <h1 class="text-white/50 text-[25px] font-semibold">Kecepatan Kapal</h1>
                            </div>
                            <div class="text-left my-auto ml-4 text-[25px] font-semibold">
                                <span id="speed-ship">-</span>
                            </div>
                            <div><i class="fa-solid fa-ship text-[70px] text-white/25"></i></div>
                        </div>
                    </div>
                </div>
                <span class="text-[25px] font-bold"><i class="fa-solid fa-circle-info mr-3"></i>Log Kapal</span>
                <div class="grid grid-cols-2 gap-3">
                    <!-- Masuk Stage -->
                    <div id="log-enter-arena" class="bg-[#C58709] border border-[#676767] p-4 mt-3 rounded-xl">
                        <div class="grid grid-cols-3 gap-2">
                            <div><i class="log-icon fa-solid fa-circle-exclamation text-[80px] text-white/50"></i></div>
                            <div class="text-left col-span-2">
                                <h1 class="text-[25px] font-semibold">Masuk Stage</h1>
                                <span class="log-status text-white/50 text-[25px] font-semibold">Pending</span>
                            </div>
                        </div>
                    </div>
                    <!-- Posisi Siap -->
                    <div id="log-ready" class="bg-[#C58709] border border-[#676767] p-4 mt-3 rounded-xl">
                        <div class="grid grid-cols-3 gap-2">
                            <div><i class="log-icon fa-solid fa-circle-exclamation text-[80px] text-white/50"></i></div>
                            <div class="text-left col-span-2">
                                <h1 class="text-[25px] font-semibold">Posisi Siap</h1>
                                <span class="log-status text-white/50 text-[25px] font-semibold">Pending</span>
                            </div>
                        </div>
                    </div>
                    <!-- Start -->
                    <div id="log-start" class="bg-[#C58709] border border-[#676767] p-4 mt-3 rounded-xl">
                        <div class="grid grid-cols-3 gap-2">
                            <div><i class="log-icon fa-solid fa-circle-exclamation text-[80px] text-white/50"></i></div>
                            <div class="text-left col-span-2">
                                <h1 class="text-[25px] font-semibold">Start</h1>
                                <span class="log-status text-white/50 text-[25px] font-semibold">Pending</span>
                            </div>
                        </div>
                    </div>
                    <!-- Finish -->
                    <div id="log-finish" class="bg-[#C58709] border border-[#676767] p-4 mt-3 rounded-xl">
                        <div class="grid grid-cols-3 gap-2">
                            <div><i class="log-icon fa-solid fa-circle-exclamation text-[80px] text-white/50"></i></div>
                            <div class="text-left col-span-2">
                                <h1 class="text-[25px] font-semibold">Finish</h1>
                                <span class="log-status text-white/50 text-[25px] font-semibold">Pending</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="bg-[#17161B] text-white text-center rounded-xl p-4">
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div class="mt-3 text-center">
                        <h1 class="text-[30px] font-bold">Kamera Atas</h1>
                        <video id="video1" class="rounded-xl mt-2 w-full h-[180px] object-cover" autoplay playsinline></video>
                    </div>
                    <div class="mt-3 text-center">
                        <h1 class="text-[30px] font-bold">Kamera Bawah</h1>
                        <video id="video2" class="rounded-xl mt-2 w-full h-[180px] object-cover" autoplay playsinline></video>
                    </div>
                    <div class="col-span-2">
                        <h1 class="text-[30px] font-bold">Peta</h1>
                        <div id="map" class="w-full h-[380px] rounded-xl"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>

    <!-- Inisialisasi map SEBELUM firebase.js -->
    <script>
        const map = L.map('map').setView([-7.960061243011885, 112.62048652662472], 15);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap contributors</a>'
        }).addTo(map);
        setTimeout(() => map.invalidateSize(), 300);

        const video1 = document.getElementById('video1');
        const video2 = document.getElementById('video2');
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                video1.srcObject = stream;
                video2.srcObject = stream;
            } catch (error) {
                console.error("Error accessing camera:", error);
            }
        }
        startCamera();
    </script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="firebase.js"></script>

</body>
</html>
